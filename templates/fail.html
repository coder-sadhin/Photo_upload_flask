{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 relative z-10">
    <div class="glass max-w-lg w-full rounded-3xl p-10 border border-red-500/20 text-center shadow-2xl animate-fade-in-up">
        <div class="w-20 h-20 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
        </div>
        
        <h1 class="text-3xl font-bold dark:text-white mb-2">Registration Failed</h1>
        <p class="text-zinc-500 dark:text-zinc-400 mb-8">{{ error_message or "An unexpected error occurred during the upload process." }}</p>

        <a href="/file-product" class="inline-block w-full py-4 bg-red-600 hover:bg-red-500 text-white font-bold rounded-2xl transition-all shadow-lg shadow-red-500/20">
            Try Again
        </a>
    </div>
</div>
{% endblock %}
