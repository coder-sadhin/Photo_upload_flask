{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 dark:from-dark dark:via-dark-secondary dark:to-dark py-12">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white dark:bg-dark-secondary rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">
                    Reset Password
                </h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2">Enter your new password</p>
            </div>

            <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">New Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white transition-all"
                           placeholder="Enter new password">
                    {% if form.password.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ form.password.errors[0] }}</p>
                    {% endif %}
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Confirm Password</label>
                    <input type="password" name="confirm_password" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white transition-all"
                           placeholder="Confirm new password">
                    {% if form.confirm_password.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ form.confirm_password.errors[0] }}</p>
                    {% endif %}
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-105">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
