{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 dark:from-dark dark:via-dark-secondary dark:to-dark">
    <div class="max-w-6xl w-full mx-4">
        <div class="grid md:grid-cols-2 gap-8 items-center">
            <div class="hidden md:block">
                <h1 class="text-5xl font-bold bg-gradient-to-r from-primary via-purple-500 to-accent bg-clip-text text-transparent mb-4">
                    SocialMedia
                </h1>
                <p class="text-xl text-gray-600 dark:text-gray-400">
                    Connect with friends and share your moments with the world.
                </p>
            </div>

            <div class="bg-white dark:bg-dark-secondary rounded-2xl shadow-2xl p-8">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6 text-center">
                    Welcome Back
                </h2>

                <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-4">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                        <input type="email" name="email" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white transition-all"
                               placeholder="Enter your email">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                        <input type="password" name="password" required
                               class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white transition-all"
                               placeholder="Enter your password">
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center">
                            <input type="checkbox" name="remember_me" class="rounded border-gray-300 text-primary focus:ring-primary">
                            <span class="ml-2 text-gray-600 dark:text-gray-400">Remember me</span>
                        </label>
                        <a href="{{ url_for('auth.forgot_password') }}" class="text-primary hover:underline">
                            Forgot password?
                        </a>
                    </div>

                    <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-105">
                        Log In
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600 dark:text-gray-400">
                        Don't have an account?
                        <a href="{{ url_for('auth.register') }}" class="text-primary hover:underline font-semibold">
                            Sign up
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
