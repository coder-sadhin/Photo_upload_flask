{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 relative z-10">
    <div class="glass max-w-lg w-full rounded-3xl p-10 border border-emerald-500/20 text-center shadow-2xl animate-fade-in-up">
        <div class="w-20 h-20 bg-emerald-500/10 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-emerald-500/20">
            <i class="fa-solid fa-check-double text-3xl"></i>
        </div>
        
        <h1 class="text-3xl font-bold dark:text-white mb-2">Registration Success!</h1>
        <p class="text-zinc-500 dark:text-zinc-400 mb-8">Your product has been secured on the Traceability Ledger.</p>

        <div class="bg-black/5 dark:bg-white/5 border border-black/5 dark:border-white/10 rounded-2xl p-6 mb-8">
            <span class="text-[10px] uppercase tracking-widest text-zinc-500 block mb-2 font-bold">Your Unique Product ID</span>
            <div class="flex items-center justify-between gap-4">
                <code id="product_id" class="text-2xl font-mono font-bold text-emerald-500 tracking-wider">{{ product_id }}</code>
                <button onclick="copyId()" class="w-12 h-12 flex items-center justify-center rounded-xl bg-violet-600 hover:bg-violet-500 text-white transition-all shadow-lg shadow-violet-500/30">
                    <i id="copy_icon" class="fa-solid fa-copy"></i>
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <a href="/" class="w-full py-4 bg-white dark:bg-zinc-800 text-slate-900 dark:text-white font-bold rounded-2xl border border-black/5 dark:border-white/10 hover:scale-[1.02] transition-transform">
                Go to Home & Verify
            </a>
            <a href="/file-product" class="text-sm text-zinc-500 hover:text-violet-500 transition-colors">
                Register another product
            </a>
        </div>
    </div>
</div>

<script>
function copyId() {
    const idText = document.getElementById('product_id').innerText;
    const icon = document.getElementById('copy_icon');
    
    navigator.clipboard.writeText(idText).then(() => {
        icon.classList.replace('fa-copy', 'fa-check');
        setTimeout(() => {
            icon.classList.replace('fa-check', 'fa-copy');
        }, 2000);
    });
}
</script>
{% endblock %}
