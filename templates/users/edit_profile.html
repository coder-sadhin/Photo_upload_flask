{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8">
    <div class="bg-white dark:bg-dark-secondary rounded-2xl shadow-sm p-8">
        <h1 class="text-2xl font-bold mb-6 dark:text-white">Edit Profile</h1>

        <form method="POST" action="{{ url_for('users.update_profile_picture') }}" enctype="multipart/form-data" class="mb-8">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="flex items-center space-x-6">
                <img src="{{ url_for('static', filename='uploads/profile_pics/' + current_user.profile.profile_picture) }}"
                     class="w-24 h-24 rounded-full object-cover">
                <div>
                    <h3 class="font-semibold dark:text-white">Profile Picture</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">JPG, PNG, or GIF. Max 5MB.</p>
                    <input type="file" name="profile_picture" accept="image/*" class="text-sm">
                    <button type="submit" class="mt-2 px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-secondary transition-colors">
                        Upload
                    </button>
                </div>
            </div>
        </form>

        <form method="POST" action="{{ url_for('users.update_cover_photo') }}" enctype="multipart/form-data" class="mb-8">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="flex items-center space-x-6">
                <img src="{{ url_for('static', filename='uploads/cover_photos/' + (current_user.profile.cover_photo or 'default_cover.jpg')) }}"
                     class="w-32 h-20 rounded-lg object-cover">
                <div>
                    <h3 class="font-semibold dark:text-white">Cover Photo</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-2">JPG, PNG, or GIF. Max 5MB.</p>
                    <input type="file" name="cover_photo" accept="image/*" class="text-sm">
                    <button type="submit" class="mt-2 px-4 py-2 bg-primary text-white rounded-lg text-sm hover:bg-secondary transition-colors">
                        Upload
                    </button>
                </div>
            </div>
        </form>

        <form method="POST" action="{{ url_for('users.edit_profile') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Full Name</label>
                    <input type="text" name="full_name" value="{{ form.full_name.data or current_user.profile.full_name }}"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Username</label>
                    <input type="text" value="{{ current_user.username }}" disabled
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-dark text-gray-500">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Bio</label>
                    <textarea name="bio" rows="3"
                              class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white resize-none">{{ form.bio.data or current_user.profile.bio or '' }}</textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                    <input type="email" value="{{ current_user.email }}" disabled
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-dark text-gray-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone</label>
                    <input type="tel" name="phone" value="{{ form.phone.data or current_user.profile.phone or '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Location</label>
                    <input type="text" name="location" value="{{ form.location.data or current_user.profile.location or '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Website</label>
                    <input type="url" name="website" value="{{ form.website.data or current_user.profile.website or '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Gender</label>
                    <select name="gender" class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                        <option value="">Prefer not to say</option>
                        <option value="male" {% if current_user.profile.gender == 'male' %}selected{% endif %}>Male</option>
                        <option value="female" {% if current_user.profile.gender == 'female' %}selected{% endif %}>Female</option>
                        <option value="other" {% if current_user.profile.gender == 'other' %}selected{% endif %}>Other</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date of Birth</label>
                    <input type="date" name="date_of_birth"
                           value="{{ form.date_of_birth.data.strftime('%Y-%m-%d') if form.date_of_birth.data else '' }}"
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary dark:text-white">
                </div>

                <div class="md:col-span-2">
                    <label class="flex items-center">
                        <input type="checkbox" name="is_private" {% if current_user.profile.is_private %}checked{% endif %}
                               class="rounded border-gray-300 text-primary focus:ring-primary">
                        <span class="ml-2 text-gray-700 dark:text-gray-300">Private Account</span>
                    </label>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">When enabled, only your followers can see your posts.</p>
                </div>
            </div>

            <div class="mt-8 flex justify-end space-x-4">
                <a href="{{ url_for('users.profile', username=current_user.username) }}" class="px-6 py-3 rounded-xl border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-3 bg-primary text-white rounded-xl hover:bg-secondary transition-colors font-semibold">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
