{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-100 via-pink-50 to-blue-100 dark:from-dark dark:via-dark-secondary dark:to-dark py-12">
    <div class="max-w-md w-full mx-4">
        <div class="bg-white dark:bg-dark-secondary rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">
                    Forgot Password?
                </h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2">Enter your email to reset your password</p>
            </div>

            <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                    <input type="email" name="email" required
                           class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-dark focus:ring-2 focus:ring-primary focus:border-transparent dark:text-white transition-all"
                           placeholder="Enter your email">
                    {% if form.email.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ form.email.errors[0] }}</p>
                    {% endif %}
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-semibold py-3 rounded-xl transition-all transform hover:scale-105">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600 dark:text-gray-400">
                    Remember your password?
                    <a href="{{ url_for('auth.login') }}" class="text-primary hover:underline font-semibold">
                        Log in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
